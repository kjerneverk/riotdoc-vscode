# Pre-publish scoped npm-check-updates runs npm install, which can rewrite
# package-lock.json even when package.json is unchanged. Tree publish only
# compares package.json before/after to decide whether to auto-commit; if only
# the lockfile changes, the repo stays dirty and publish fails the git clean
# precheck. Disable scoped pre-publish updates; run
# `kodrdriv tree updates @kjerneverk` when you want registry bumps.
publish:
  scopedDependencyUpdates: []
